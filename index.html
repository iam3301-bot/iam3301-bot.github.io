<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Our Memoir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============================================ -->
  <!-- Floating Orbs Background                     -->
  <!-- ============================================ -->
  <div class="floating-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
    <div class="orb orb-6"></div>
  </div>

  <!-- ============================================ -->
  <!-- Hero Section                                 -->
  <!-- ============================================ -->
  <section id="hero" class="hero-section">
    <div class="hero-content fade-in-up">
      <div class="hero-icon-wrap glass-panel glass-specular">
        <svg class="hero-heart-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                   2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                   C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                   c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <h1 class="hero-title" data-i18n="hero-title"></h1>
      <p class="hero-subtitle" data-i18n="hero-subtitle"></p>

      <!-- Day Counter -->
      <div class="counter-wrap glass-panel-subtle">
        <div class="counter-unit">
          <span class="counter-number" id="counter-days">--</span>
          <span class="counter-label" data-i18n="counter-days"></span>
        </div>
        <span class="counter-sep">:</span>
        <div class="counter-unit">
          <span class="counter-number" id="counter-hours">--</span>
          <span class="counter-label" data-i18n="counter-hours"></span>
        </div>
        <span class="counter-sep">:</span>
        <div class="counter-unit">
          <span class="counter-number" id="counter-minutes">--</span>
          <span class="counter-label" data-i18n="counter-minutes"></span>
        </div>
        <span class="counter-sep">:</span>
        <div class="counter-unit">
          <span class="counter-number" id="counter-seconds">--</span>
          <span class="counter-label" data-i18n="counter-seconds"></span>
        </div>
      </div>

      <div class="scroll-hint">
        <span class="scroll-text">SCROLL</span>
        <svg class="scroll-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- About Section                                -->
  <!-- ============================================ -->
  <section id="about" class="about-section reveal-section">
    <div class="about-card glass-panel glass-specular">
      <div class="about-avatar">
        <div class="avatar-placeholder glass-panel-subtle"></div>
      </div>
      <div class="about-text">
        <h2 class="section-heading" data-i18n="about-title"></h2>
        <p class="about-description" data-i18n="about-desc"></p>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- Timeline Section                             -->
  <!-- ============================================ -->
  <section id="timeline" class="timeline-section reveal-section">
    <div class="section-header">
      <h2 class="section-heading" data-i18n="timeline-title"></h2>
      <p class="section-subheading" data-i18n="timeline-subtitle"></p>
    </div>

    <div class="timeline-line"></div>

    <div class="timeline-container">
      <!-- Timeline Item 1 -->
      <div class="timeline-item timeline-left reveal-item">
        <div class="timeline-dot glass-panel">
          <svg viewBox="0 0 24 24" fill="currentColor" class="timeline-icon">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                     2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                     C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                     c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <div class="timeline-card glass-panel glass-specular">
          <span class="timeline-tag" data-i18n="tl-tag-1"></span>
          <span class="timeline-date" data-i18n="tl-date-1"></span>
          <h3 class="timeline-card-title" data-i18n="tl-title-1"></h3>
          <p class="timeline-card-desc" data-i18n="tl-desc-1"></p>
        </div>
      </div>

      <!-- Timeline Item 2 -->
      <div class="timeline-item timeline-right reveal-item">
        <div class="timeline-dot glass-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="timeline-icon">
            <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <div class="timeline-card glass-panel glass-specular">
          <div class="timeline-image-placeholder"></div>
          <span class="timeline-tag" data-i18n="tl-tag-2"></span>
          <span class="timeline-date" data-i18n="tl-date-2"></span>
          <h3 class="timeline-card-title" data-i18n="tl-title-2"></h3>
          <p class="timeline-card-desc" data-i18n="tl-desc-2"></p>
        </div>
      </div>

      <!-- Timeline Item 3 -->
      <div class="timeline-item timeline-left reveal-item">
        <div class="timeline-dot glass-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="timeline-icon">
            <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
        </div>
        <div class="timeline-card glass-panel glass-specular">
          <span class="timeline-tag" data-i18n="tl-tag-3"></span>
          <span class="timeline-date" data-i18n="tl-date-3"></span>
          <h3 class="timeline-card-title" data-i18n="tl-title-3"></h3>
          <p class="timeline-card-desc" data-i18n="tl-desc-3"></p>
        </div>
      </div>

      <!-- Timeline Item 4 -->
      <div class="timeline-item timeline-right reveal-item">
        <div class="timeline-dot glass-panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="timeline-icon">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div class="timeline-card glass-panel glass-specular">
          <span class="timeline-tag" data-i18n="tl-tag-4"></span>
          <span class="timeline-date" data-i18n="tl-date-4"></span>
          <h3 class="timeline-card-title" data-i18n="tl-title-4"></h3>
          <p class="timeline-card-desc" data-i18n="tl-desc-4"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- Gallery Section                              -->
  <!-- ============================================ -->
  <section id="gallery" class="gallery-section reveal-section">
    <div class="section-header">
      <h2 class="section-heading" data-i18n="gallery-title"></h2>
      <p class="section-subheading" data-i18n="gallery-subtitle"></p>
    </div>
    <div class="gallery-grid">
      <div class="gallery-slot glass-panel glass-specular"></div>
      <div class="gallery-slot glass-panel glass-specular"></div>
      <div class="gallery-slot glass-panel glass-specular"></div>
      <div class="gallery-slot glass-panel glass-specular"></div>
      <div class="gallery-slot glass-panel glass-specular"></div>
      <div class="gallery-slot glass-panel glass-specular"></div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- Declaration / Message Section                -->
  <!-- ============================================ -->
  <section id="declaration" class="declaration-section reveal-section">
    <div class="declaration-card glass-panel-elevated glass-specular">
      <div class="declaration-heart">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                   2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                   C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                   c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <h2 class="declaration-title" data-i18n="decl-title"></h2>
      <p class="declaration-lead" data-i18n="decl-lead"></p>
      <p class="declaration-body" data-i18n="decl-body"></p>
      <p class="declaration-closing" data-i18n="decl-closing"></p>
      <p class="declaration-signature" data-i18n="decl-signature"></p>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- Footer                                       -->
  <!-- ============================================ -->
  <footer class="site-footer">
    <div class="footer-divider">
      <span class="footer-line"></span>
      <svg class="footer-heart" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span class="footer-line"></span>
    </div>
    <p class="footer-text" data-i18n="footer-text"></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
